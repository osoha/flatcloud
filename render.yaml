services:
  - type: web
    name: flatcloud-rent
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci --no-audit --no-fund && npm run build
    preDeployCommand: npm run db:migrate && npm run db:bootstrap
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: DATABASE_URL
        fromDatabase:
          name: flatcloud-rent-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: INITIAL_ADMIN_NAME
        sync: false
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: BANKING_PROVIDER
        value: enablebanking
      - key: ENABLE_BANKING_APP_ID
        sync: false
      - key: ENABLE_BANKING_PRIVATE_KEY
        sync: false
      - key: ENABLE_BANKING_BASE_URL
        value: https://api.enablebanking.com

databases:
  - name: flatcloud-rent-db
    region: frankfurt
    plan: basic-256mb
    postgresMajorVersion: "18"
    databaseName: flatcloud_rent
    user: flatcloud_app
    ipAllowList: []
