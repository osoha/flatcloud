services:
  - type: web
    name: flatcloud-rent
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci --no-audit --no-fund && npm run build
    preDeployCommand: npm run db:migrate && npm run db:bootstrap
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: DATABASE_URL
        fromDatabase:
          name: flatcloud-rent-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: BANK_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: INITIAL_ADMIN_NAME
        sync: false
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: BANKING_PROVIDER
        value: csas-premium
      - key: CSAS_CLIENT_ID
        sync: false
      - key: CSAS_CLIENT_SECRET
        sync: false
      - key: CSAS_WEB_API_KEY
        sync: false
      - key: CSAS_API_BASE_URL
        sync: false
      - key: CSAS_AUTH_URL
        sync: false
      - key: CSAS_TOKEN_URL
        sync: false
      - key: CSAS_CONSENTS_PATH
        value: /consents
      - key: CSAS_ACCOUNTS_PATH
        value: /accounts
      - key: CSAS_TRANSACTIONS_PATH_TEMPLATE
        value: /accounts/{accountId}/transactions
      - key: CSAS_BALANCES_PATH_TEMPLATE
        value: /accounts/{accountId}/balances
      - key: CSAS_SCOPE_TEMPLATE
        value: AIS:{consentId} openid offline_access
      - key: ENABLE_BANKING_APP_ID
        sync: false
      - key: ENABLE_BANKING_PRIVATE_KEY
        sync: false
      - key: ENABLE_BANKING_BASE_URL
        value: https://api.enablebanking.com
      - key: SMTP_HOST
        value: smtp.fortion.net
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_NAME
        value: FlatCloud
      - key: SMTP_FROM_EMAIL
        sync: false

  - type: cron
    name: flatcloud-rent-bank-sync
    runtime: node
    region: frankfurt
    plan: starter
    schedule: "0 * * * *"
    buildCommand: npm ci --no-audit --no-fund && npx prisma generate
    startCommand: npm run banking:cron
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: DATABASE_URL
        fromDatabase:
          name: flatcloud-rent-db
          property: connectionString
      - key: BANK_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: BANKING_PROVIDER
        value: csas-premium
      - key: CSAS_CLIENT_ID
        sync: false
      - key: CSAS_CLIENT_SECRET
        sync: false
      - key: CSAS_WEB_API_KEY
        sync: false
      - key: CSAS_API_BASE_URL
        sync: false
      - key: CSAS_AUTH_URL
        sync: false
      - key: CSAS_TOKEN_URL
        sync: false
      - key: CSAS_CONSENTS_PATH
        value: /consents
      - key: CSAS_ACCOUNTS_PATH
        value: /accounts
      - key: CSAS_TRANSACTIONS_PATH_TEMPLATE
        value: /accounts/{accountId}/transactions
      - key: CSAS_BALANCES_PATH_TEMPLATE
        value: /accounts/{accountId}/balances
      - key: CSAS_SCOPE_TEMPLATE
        value: AIS:{consentId} openid offline_access
      - key: ENABLE_BANKING_APP_ID
        sync: false
      - key: ENABLE_BANKING_PRIVATE_KEY
        sync: false
      - key: ENABLE_BANKING_BASE_URL
        value: https://api.enablebanking.com

  - type: cron
    name: flatcloud-rent-notifications
    runtime: node
    region: frankfurt
    plan: starter
    schedule: "0 * * * *"
    buildCommand: npm ci --no-audit --no-fund && npx prisma generate
    startCommand: npm run rent:notifications:cron
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: DATABASE_URL
        fromDatabase:
          name: flatcloud-rent-db
          property: connectionString
      - key: BANK_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.fortion.net
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_NAME
        value: FlatCloud
      - key: SMTP_FROM_EMAIL
        sync: false

databases:
  - name: flatcloud-rent-db
    region: frankfurt
    plan: basic-256mb
    postgresMajorVersion: "18"
    databaseName: flatcloud_rent
    user: flatcloud_app
    ipAllowList: []
